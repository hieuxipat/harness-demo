stages:
  - validate
  - package
  - release

variables:
  PACKAGE_NAME: "templates.tar.gz"

# ── Stage 1: Validate template.json files on every push ──
validate:
  stage: validate
  image: node:20-alpine
  script:
    - |
      echo "Validating template.json files..."
      ERRORS=0
      for f in $(find templates -name "template.json"); do
        if ! node -e "JSON.parse(require('fs').readFileSync('$f','utf-8'))" 2>/dev/null; then
          echo "INVALID JSON: $f"
          ERRORS=$((ERRORS + 1))
        else
          TYPE=$(node -e "const c=JSON.parse(require('fs').readFileSync('$f','utf-8')); console.log(c.type || 'MISSING')")
          NAME=$(node -e "const c=JSON.parse(require('fs').readFileSync('$f','utf-8')); console.log(c.name || 'MISSING')")
          if [ "$TYPE" = "MISSING" ] || [ "$NAME" = "MISSING" ]; then
            echo "MISSING name or type: $f"
            ERRORS=$((ERRORS + 1))
          else
            echo "OK: $f ($TYPE/$NAME)"
          fi
        fi
      done
      if [ $ERRORS -gt 0 ]; then
        echo "$ERRORS template(s) have errors"
        exit 1
      fi
      echo "All templates valid"
  rules:
    - when: always

# ── Stage 2: Package templates into tarball ──
package:
  stage: package
  image: node:20-alpine
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  script:
    - cd templates
    - tar -czf ../$PACKAGE_NAME .
    - cd ..
    - echo "Package size:" && ls -lh $PACKAGE_NAME
  artifacts:
    paths:
      - $PACKAGE_NAME
    expire_in: 1 week

# ── Stage 3: Upload tarball + create GitLab Release ──
release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - package
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  before_script:
    - apk add --no-cache curl
    - |
      curl --fail --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        --upload-file $PACKAGE_NAME \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/templates/${CI_COMMIT_TAG}/${PACKAGE_NAME}"
  script:
    - echo "Creating release for $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "Templates $CI_COMMIT_TAG"
    description: "Template release $CI_COMMIT_TAG"
    assets:
      links:
        - name: $PACKAGE_NAME
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/templates/${CI_COMMIT_TAG}/${PACKAGE_NAME}"
          link_type: package
